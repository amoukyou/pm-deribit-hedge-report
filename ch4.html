<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第四章 · 监控仪表盘</title>
<style>
  :root { --bg:#f8f9fc; --card:#fff; --border:#e2e5ed; --text:#1a1d27; --muted:#6b7280; --accent:#4f46e5; --green:#16a34a; --red:#dc2626; --blue:#1d4ed8; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,'PingFang SC',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }

  /* Top nav - same as other pages */
  .topnav {
    position:sticky; top:0; z-index:100;
    background:rgba(255,255,255,0.92); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border); padding:0 20px;
  }
  .topnav-inner {
    max-width:1100px; margin:0 auto;
    display:flex; align-items:center; gap:0; height:48px; overflow-x:auto;
  }
  .topnav-inner a {
    color:var(--muted); text-decoration:none; font-size:0.85rem;
    font-weight:600; padding:0 16px; height:48px; display:flex;
    align-items:center; white-space:nowrap; border-bottom:2px solid transparent;
    transition:all 0.2s;
  }
  .topnav-inner a:hover { color:var(--text); }
  .topnav-inner a.nav-ch4 { border-bottom-color:transparent; }
  .topnav-inner a.nav-ch4:hover { border-bottom-color:var(--blue); color:var(--blue); }
  .topnav-inner a.nav-ch4.active-nav { color:var(--blue); border-bottom-color:var(--blue); }
  .topnav-inner .nav-brand { color:var(--text); font-weight:700; font-size:0.9rem; margin-right:auto; padding-left:0; }

  /* Status indicator */
  .status-bar { display:flex; align-items:center; gap:8px; padding:8px 24px; background:var(--card); border-bottom:1px solid var(--border); }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; }
  .dot.live { background:#4ade80; animation:pulse 2s infinite; }
  .dot.loading { background:#fbbf24; }
  .dot.error { background:#f87171; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .status-bar .status-text { font-size:0.82rem; color:var(--muted); }

  /* Stats bar */
  .stats { display:flex; gap:12px; padding:16px 24px; flex-wrap:wrap; }
  .stat { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 18px; min-width:140px; }
  .stat .label { font-size:0.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; }
  .stat .value { font-size:1.3rem; font-weight:700; margin-top:2px; }
  .stat .value.green { color:var(--green); }
  .stat .value.red { color:var(--red); }

  /* Controls */
  .controls { padding:8px 24px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .controls button { background:var(--card); border:1px solid var(--border); color:var(--text); padding:5px 14px; border-radius:6px; cursor:pointer; font-size:0.82rem; transition:all 0.15s; }
  .controls button:hover { border-color:var(--blue); }
  .controls button.active { background:var(--accent); border-color:var(--accent); color:white; }
  .controls .sep { color:var(--border); margin:0 4px; }
  .controls .refresh-btn { background:var(--accent); color:white; border-color:var(--accent); }
  .controls .refresh-btn:hover { opacity:0.9; }

  /* Table */
  .table-wrap { padding:0 24px 24px; overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:0.8rem; }
  th { background:#f0f4ff; color:var(--blue); padding:8px 10px; text-align:left; position:sticky; top:48px; z-index:1; cursor:pointer; white-space:nowrap; border-bottom:2px solid var(--blue); font-weight:600; }
  th:hover { background:#dbeafe; }
  td { padding:7px 10px; border-bottom:1px solid var(--border); }
  tr:hover { background:#f0f4ff; }
  .qp-pos { color:var(--green); font-weight:700; }
  .qp-neg { color:var(--red); }
  .qp-null { color:var(--muted); font-style:italic; }
  .badge { display:inline-block; font-size:0.68rem; padding:1px 7px; border-radius:8px; font-weight:600; }
  .badge-above { background:rgba(79,70,229,0.12); color:var(--accent); }
  .badge-range { background:rgba(234,88,12,0.12); color:#ea580c; }
  .badge-yes { background:rgba(22,163,74,0.1); color:var(--green); }
  .badge-no { background:rgba(220,38,38,0.1); color:var(--red); }
  a { color:var(--blue); text-decoration:none; }
  a:hover { text-decoration:underline; }
  .mono { font-family:'SF Mono',Consolas,monospace; font-size:0.78rem; }

  .empty { text-align:center; padding:60px 24px; color:var(--muted); }
  .empty p { font-size:1.1rem; margin-bottom:8px; }
</style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-inner">
    <a href="index.html" class="nav-brand">PM × Deribit</a>
    <a href="index.html">首页</a>
    <a href="ch1.html">第一章</a>
    <a href="ch2.html">第二章</a>
    <a href="ch3.html">第三章</a>
    <a href="ch4.html" class="nav-ch4 active-nav">第四章</a>
  </div>
</nav>

<div class="status-bar">
  <span class="dot loading" id="statusDot"></span>
  <span class="status-text" id="statusText">连接中...</span>
</div>

<div class="stats" id="statsBar">
  <div class="stat"><div class="label">BTC 价格</div><div class="value" id="btcPrice">--</div></div>
  <div class="stat"><div class="label">监控行数</div><div class="value" id="rowCount">--</div></div>
  <div class="stat"><div class="label">q-p &gt; 0</div><div class="value green" id="positiveCount">--</div></div>
  <div class="stat"><div class="label">q-p &lt; 0</div><div class="value red" id="negativeCount">--</div></div>
  <div class="stat"><div class="label">最大 q-p</div><div class="value green" id="maxQP">--</div></div>
  <div class="stat"><div class="label">更新时间</div><div class="value" id="updateTime" style="font-size:0.9rem;">--</div></div>
</div>

<div class="controls">
  <button class="active" onclick="setFilter('all',this)">全部</button>
  <button onclick="setFilter('Above',this)">Above</button>
  <button onclick="setFilter('Range',this)">Range</button>
  <span class="sep">|</span>
  <button class="active" onclick="setDirFilter('all',this)">Yes+No</button>
  <button onclick="setDirFilter('Buy Yes',this)">Buy Yes</button>
  <button onclick="setDirFilter('Buy No',this)">Buy No</button>
  <span class="sep">|</span>
  <button onclick="setSort('qp')">按 q-p 排序</button>
  <button onclick="setSort('time')">按时间差排序</button>
  <button onclick="setSort('pm_ask')">按 PM ask 排序</button>
  <span class="sep">|</span>
  <button onclick="toggleNull()">隐藏无数据行</button>
  <button class="refresh-btn" onclick="fetchData()">刷新数据</button>
</div>

<div class="table-wrap">
  <table id="mainTable">
    <thead>
      <tr>
        <th>类型</th>
        <th>策略</th>
        <th>方向</th>
        <th>PM 问题</th>
        <th>PM ask (p)</th>
        <th>Deribit 组合</th>
        <th>Deribit q</th>
        <th style="background:#1e3a5f;">q - p</th>
        <th>时间差</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div class="empty" id="emptyMsg" style="display:none;">
  <p>等待数据加载...</p>
  <p style="font-size:0.85rem;">确保后端运行中：<code>node server.js</code></p>
</div>

<script>
let allRows = [];
let currentFilter = 'all';
let currentDirFilter = 'all';
let currentSort = 'qp';
let hideNull = false;

async function fetchData() {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'dot loading';
  txt.textContent = '拉取中...';

  try {
    const res = await fetch('/api/monitor');
    const data = await res.json();
    allRows = data.rows;

    // Update stats
    document.getElementById('btcPrice').textContent = '$' + Math.round(data.underlying).toLocaleString();
    document.getElementById('rowCount').textContent = allRows.length;
    document.getElementById('updateTime').textContent = new Date(data.updated_at).toLocaleTimeString();

    const pos = allRows.filter(r => r.qp > 0).length;
    const neg = allRows.filter(r => r.qp < 0).length;
    document.getElementById('positiveCount').textContent = pos;
    document.getElementById('negativeCount').textContent = neg;

    const validQP = allRows.filter(r => r.qp != null).map(r => r.qp);
    const maxQP = validQP.length > 0 ? Math.max(...validQP) : null;
    document.getElementById('maxQP').textContent = maxQP != null ? maxQP.toFixed(4) : '--';

    dot.className = 'dot live';
    txt.textContent = '实时';
    document.getElementById('emptyMsg').style.display = 'none';

    renderTable();
  } catch(e) {
    dot.className = 'dot error';
    txt.textContent = '连接失败';
    document.getElementById('emptyMsg').style.display = 'block';
    console.error(e);
  }
}

function renderTable() {
  let rows = [...allRows];

  // Filter
  if (currentFilter !== 'all') rows = rows.filter(r => r.type === currentFilter);
  if (currentDirFilter !== 'all') rows = rows.filter(r => r.direction === currentDirFilter);
  if (hideNull) rows = rows.filter(r => r.qp !== null);

  // Sort
  if (currentSort === 'qp') rows.sort((a, b) => (b.qp ?? -999) - (a.qp ?? -999));
  else if (currentSort === 'time') rows.sort((a, b) => a.time_diff - b.time_diff);
  else if (currentSort === 'pm_ask') rows.sort((a, b) => (a.pm_ask ?? 999) - (b.pm_ask ?? 999));

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  rows.forEach(r => {
    const tr = document.createElement('tr');
    const typeBadge = r.type === 'Above'
      ? '<span class="badge badge-above">Above</span>'
      : '<span class="badge badge-range">Range</span>';
    const dirBadge = r.direction === 'Buy Yes'
      ? '<span class="badge badge-yes">Buy Yes</span>'
      : '<span class="badge badge-no">Buy No</span>';

    const pmAsk = r.pm_ask != null ? r.pm_ask.toFixed(3) : '--';
    const dQ = r.deribit_q != null ? r.deribit_q.toFixed(4) : '--';

    let qpCell;
    if (r.qp == null) {
      qpCell = '<span class="qp-null">--</span>';
    } else if (r.qp > 0) {
      qpCell = `<span class="qp-pos">+${r.qp.toFixed(4)}</span>`;
    } else {
      qpCell = `<span class="qp-neg">${r.qp.toFixed(4)}</span>`;
    }

    const pmLink = r.pm_link ? `<a href="${r.pm_link}" target="_blank">${r.question.replace('Will the price of Bitcoin be ','BTC ')}</a>` : r.question;
    const dbLink = r.deribit_link ? `<a href="${r.deribit_link}" target="_blank" class="mono">${r.deribit_desc}</a>` : `<span class="mono">${r.deribit_desc}</span>`;

    tr.innerHTML = `<td>${typeBadge}</td><td class="mono">${r.strategy}</td><td>${dirBadge}</td><td>${pmLink}</td><td class="mono">${pmAsk}</td><td>${dbLink}</td><td class="mono">${dQ}</td><td style="font-weight:700;">${qpCell}</td><td>${r.time_diff}h</td>`;
    tbody.appendChild(tr);
  });
}

function setFilter(f, btn) {
  currentFilter = f;
  btn.parentElement.querySelectorAll('button').forEach(b => { if(!b.classList.contains('refresh-btn') && !b.classList.contains('sep')) {} });
  // Simple: just re-render
  renderTable();
  // Update active state for this group
  const btns = btn.parentElement.children;
  for (let i = 0; i < 3; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
}

function setDirFilter(f, btn) {
  currentDirFilter = f;
  renderTable();
  const btns = btn.parentElement.children;
  for (let i = 4; i < 7; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
}

function setSort(s) { currentSort = s; renderTable(); }
function toggleNull() { hideNull = !hideNull; renderTable(); }

// Auto refresh every 60s
fetchData();
setInterval(fetchData, 60000);
</script>
</body>
</html>
