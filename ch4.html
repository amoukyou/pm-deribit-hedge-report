<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第四章 · 监控仪表盘</title>
<style>
  :root { --bg:#f8f9fc; --card:#fff; --border:#e2e5ed; --text:#1a1d27; --muted:#6b7280; --accent:#4f46e5; --green:#16a34a; --red:#dc2626; --blue:#1d4ed8; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,'PingFang SC',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }

  /* Top nav - same as other pages */
  .topnav {
    position:sticky; top:0; z-index:100;
    background:rgba(255,255,255,0.92); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border); padding:0 20px;
  }
  .topnav-inner {
    max-width:1100px; margin:0 auto;
    display:flex; align-items:center; gap:0; height:48px; overflow-x:auto;
  }
  .topnav-inner a {
    color:var(--muted); text-decoration:none; font-size:0.85rem;
    font-weight:600; padding:0 16px; height:48px; display:flex;
    align-items:center; white-space:nowrap; border-bottom:2px solid transparent;
    transition:all 0.2s;
  }
  .topnav-inner a:hover { color:var(--text); }
  .topnav-inner a.nav-ch4 { border-bottom-color:transparent; }
  .topnav-inner a.nav-ch4:hover { border-bottom-color:var(--blue); color:var(--blue); }
  .topnav-inner a.nav-ch4.active-nav { color:var(--blue); border-bottom-color:var(--blue); }
  .topnav-inner .nav-brand { color:var(--text); font-weight:700; font-size:0.9rem; margin-right:auto; padding-left:0; }

  /* Status indicator */
  .status-bar { display:flex; align-items:center; gap:8px; padding:8px 24px; background:var(--card); border-bottom:1px solid var(--border); }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; }
  .dot.live { background:#4ade80; animation:pulse 2s infinite; }
  .dot.loading { background:#fbbf24; }
  .dot.error { background:#f87171; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .status-bar .status-text { font-size:0.82rem; color:var(--muted); }

  /* Stats bar */
  .stats { display:flex; gap:12px; padding:16px 24px; flex-wrap:wrap; }
  .stat { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 18px; min-width:140px; }
  .stat .label { font-size:0.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; }
  .stat .value { font-size:1.3rem; font-weight:700; margin-top:2px; }
  .stat .value.green { color:var(--green); }
  .stat .value.red { color:var(--red); }

  /* Controls */
  .controls { padding:8px 24px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .controls button { background:var(--card); border:1px solid var(--border); color:var(--text); padding:5px 14px; border-radius:6px; cursor:pointer; font-size:0.82rem; transition:all 0.15s; }
  .controls button:hover { border-color:var(--blue); }
  .controls button.active { background:var(--accent); border-color:var(--accent); color:white; }
  .controls .sep { color:var(--border); margin:0 4px; }
  .controls .refresh-btn { background:var(--accent); color:white; border-color:var(--accent); }
  .controls .refresh-btn:hover { opacity:0.9; }

  /* Table */
  .table-wrap { padding:0 24px 24px; overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:0.8rem; }
  th { background:#f0f4ff; color:var(--blue); padding:8px 10px; text-align:left; position:sticky; top:48px; z-index:1; cursor:pointer; white-space:nowrap; border-bottom:2px solid var(--blue); font-weight:600; }
  th:hover { background:#dbeafe; }
  td { padding:7px 10px; border-bottom:1px solid var(--border); }
  tr:hover { background:#f0f4ff; }
  .qp-pos { color:var(--green); font-weight:700; }
  .qp-neg { color:var(--red); }
  .qp-null { color:var(--muted); font-style:italic; }
  .badge { display:inline-block; font-size:0.68rem; padding:1px 7px; border-radius:8px; font-weight:600; }
  .badge-above { background:rgba(79,70,229,0.12); color:var(--accent); }
  .badge-range { background:rgba(234,88,12,0.12); color:#ea580c; }
  .badge-yes { background:rgba(22,163,74,0.1); color:var(--green); }
  .badge-no { background:rgba(220,38,38,0.1); color:var(--red); }
  a { color:var(--blue); text-decoration:none; }
  a:hover { text-decoration:underline; }
  .mono { font-family:'SF Mono',Consolas,monospace; font-size:0.78rem; }

  .empty { text-align:center; padding:60px 24px; color:var(--muted); }
  .empty p { font-size:1.1rem; margin-bottom:8px; }

  /* Expandable detail row */
  tr.clickable { cursor:pointer; }
  tr.clickable:hover { background:#eef2ff; }
  tr.expanded { background:#eef2ff !important; }
  .detail-row td { padding:16px 20px; background:#f8faff; border-bottom:2px solid var(--blue); }
  .detail-charts { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
  .detail-chart { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:12px; }
  .detail-chart p { font-size:0.78rem; color:var(--muted); margin-bottom:6px; }
  .detail-info { font-size:0.82rem; color:var(--muted); margin-bottom:12px; }
  .detail-info b { color:var(--text); }
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
</head>
<body>

<nav class="topnav">
  <div class="topnav-inner">
    <a href="index.html" class="nav-brand">PM × Deribit</a>
    <a href="index.html">首页</a>
    <a href="ch1.html">第一章</a>
    <a href="ch2.html">第二章</a>
    <a href="ch3.html">第三章</a>
    <a href="ch4.html" class="nav-ch4 active-nav">第四章</a>
  </div>
</nav>

<div class="status-bar">
  <span class="dot loading" id="statusDot"></span>
  <span class="status-text" id="statusText">连接中...</span>
</div>

<div class="stats" id="statsBar">
  <div class="stat"><div class="label">BTC 价格</div><div class="value" id="btcPrice">--</div></div>
  <div class="stat"><div class="label">监控行数</div><div class="value" id="rowCount">--</div></div>
  <div class="stat"><div class="label">q-p &gt; 0</div><div class="value green" id="positiveCount">--</div></div>
  <div class="stat"><div class="label">q-p &lt; 0</div><div class="value red" id="negativeCount">--</div></div>
  <div class="stat"><div class="label">最大 q-p</div><div class="value green" id="maxQP">--</div></div>
  <div class="stat"><div class="label">更新时间</div><div class="value" id="updateTime" style="font-size:0.9rem;">--</div></div>
</div>

<div class="controls">
  <button class="active" onclick="setFilter('all',this)">全部</button>
  <button onclick="setFilter('Above',this)">Above</button>
  <button onclick="setFilter('Range',this)">Range</button>
  <span class="sep">|</span>
  <button class="active" onclick="setDirFilter('all',this)">Yes+No</button>
  <button onclick="setDirFilter('Buy Yes',this)">Buy Yes</button>
  <button onclick="setDirFilter('Buy No',this)">Buy No</button>
  <span class="sep">|</span>
  <button onclick="setSort('time')">按时间差排序</button>
  <button onclick="setSort('pm_ask')">按 PM ask 排序</button>
  <span class="sep">|</span>
  <button onclick="toggleNull(this)">隐藏无期权组合</button>
  <button onclick="toggleNoBook(this)">隐藏无盘口挂单</button>
</div>

<div class="table-wrap">
  <table id="mainTable">
    <thead>
      <tr>
        <th>类型</th>
        <th>策略</th>
        <th>方向</th>
        <th>PM 问题</th>
        <th>PM ask (p)</th>
        <th>Deribit 组合</th>
        <th>Deribit q</th>
        <th style="background:#1e3a5f;cursor:pointer;" onclick="toggleQPSort()" id="qpHeader">q - p ↕</th>
        <th>时间差</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div class="empty" id="emptyMsg" style="display:none;">
  <p>等待数据加载...</p>
  <p style="font-size:0.85rem;">确保后端运行中：<code>node server.js</code></p>
</div>

<script>
let allRows = [];
let currentFilter = 'all';
let currentDirFilter = 'all';
let currentSort = 'qp';
let hideNull = false;

async function fetchData() {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'dot loading';
  txt.textContent = '拉取中...';

  try {
    const res = await fetch('/api/monitor');
    const data = await res.json();
    allRows = data.rows;

    // Update stats
    document.getElementById('btcPrice').textContent = '$' + Math.round(data.underlying).toLocaleString();
    document.getElementById('rowCount').textContent = allRows.length;
    document.getElementById('updateTime').textContent = new Date(data.updated_at).toLocaleTimeString();

    const pos = allRows.filter(r => r.qp > 0).length;
    const neg = allRows.filter(r => r.qp < 0).length;
    document.getElementById('positiveCount').textContent = pos;
    document.getElementById('negativeCount').textContent = neg;

    const validQP = allRows.filter(r => r.qp != null).map(r => r.qp);
    const maxQP = validQP.length > 0 ? Math.max(...validQP) : null;
    document.getElementById('maxQP').textContent = maxQP != null ? maxQP.toFixed(4) : '--';

    dot.className = 'dot live';
    txt.textContent = '实时';
    document.getElementById('emptyMsg').style.display = 'none';

    renderTable();
  } catch(e) {
    dot.className = 'dot error';
    txt.textContent = '连接失败';
    document.getElementById('emptyMsg').style.display = 'block';
    console.error(e);
  }
}

function renderTable() {
  let rows = [...allRows];

  // Filter
  if (currentFilter !== 'all') rows = rows.filter(r => r.type === currentFilter);
  if (currentDirFilter !== 'all') rows = rows.filter(r => r.direction === currentDirFilter);
  if (hideNull) rows = rows.filter(r => r.qp !== null);
  if (hideNoBook) rows = rows.filter(r => r.leg1_price != null && r.leg1_price !== 0 && r.leg2_price != null && r.leg2_price !== 0);

  // Sort
  if (currentSort === 'qp_desc') rows.sort((a, b) => (b.qp ?? -999) - (a.qp ?? -999));
  else if (currentSort === 'qp_asc') rows.sort((a, b) => (a.qp ?? 999) - (b.qp ?? 999));
  else if (currentSort === 'time') rows.sort((a, b) => a.time_diff - b.time_diff);
  else if (currentSort === 'pm_ask') rows.sort((a, b) => (a.pm_ask ?? 999) - (b.pm_ask ?? 999));

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  rows.forEach(r => {
    const tr = document.createElement('tr');
    const typeBadge = r.type === 'Above'
      ? '<span class="badge badge-above">Above</span>'
      : '<span class="badge badge-range">Range</span>';
    const dirBadge = r.direction === 'Buy Yes'
      ? '<span class="badge badge-yes">Buy Yes</span>'
      : '<span class="badge badge-no">Buy No</span>';

    const pmAsk = r.pm_ask != null ? r.pm_ask.toFixed(3) : '--';
    const dQ = r.deribit_q != null ? r.deribit_q.toFixed(4) : '--';

    let qpCell;
    if (r.qp == null) {
      qpCell = '<span class="qp-null">--</span>';
    } else if (r.qp > 0) {
      qpCell = `<span class="qp-pos">+${r.qp.toFixed(4)}</span>`;
    } else {
      qpCell = `<span class="qp-neg">${r.qp.toFixed(4)}</span>`;
    }

    const pmLink = r.pm_link ? `<a href="${r.pm_link}" target="_blank">${r.question.replace('Will the price of Bitcoin be ','BTC ')}</a>` : r.question;
    const dbLink = r.deribit_link ? `<a href="${r.deribit_link}" target="_blank" class="mono">${r.deribit_desc}</a>` : `<span class="mono">${r.deribit_desc}</span>`;

    // PM 16:00 UTC, Deribit 08:00 UTC same day = Deribit先; if time_diff > 8 = PM先 (cross-day)
    const whoFirst = r.time_diff <= 8 ? '<span style="color:var(--muted);font-size:0.75rem;">Db先</span>' : '<span style="color:var(--muted);font-size:0.75rem;">PM先</span>';
    tr.innerHTML = `<td>${typeBadge}</td><td class="mono">${r.strategy}</td><td>${dirBadge}</td><td>${pmLink}</td><td class="mono">${pmAsk}</td><td>${dbLink}</td><td class="mono">${dQ}</td><td style="font-weight:700;">${qpCell}</td><td>${r.time_diff}h ${whoFirst}</td>`;
    tr.className = 'clickable';
    tr.addEventListener('click', (e) => {
      if (e.target.tagName === 'A') return; // don't expand when clicking links
      toggleDetail(tr, r);
    });
    tbody.appendChild(tr);
  });
}

// --- Expandable detail with 3 charts ---
let openDetail = null;
function toggleDetail(tr, r) {
  // Close existing
  if (openDetail) {
    openDetail.detailRow.remove();
    if (openDetail.tr === tr) { openDetail.tr.classList.remove('expanded'); openDetail = null; return; }
    openDetail.tr.classList.remove('expanded');
  }

  tr.classList.add('expanded');
  const detailRow = document.createElement('tr');
  detailRow.className = 'detail-row';
  const td = document.createElement('td');
  td.colSpan = 9;

  const p = r.pm_ask ?? 0.5;
  const q = r.deribit_q ?? (p + 0.05);
  let K;
  try {
    const parsed = typeof r.strike === 'string' ? JSON.parse(r.strike) : r.strike;
    K = Array.isArray(parsed) ? parsed[0] : Number(parsed);
  } catch { K = parseInt(r.strike) || 74000; }
  const isYes = r.direction === 'Buy Yes';
  const sw = r.spread_width || 1000;
  const ul = r.underlying || 73500;

  // PM side: number of tickets = 0.1 BTC * spread_width
  const pmQty = sw ? 0.1 * sw : 300;
  const pmCostPerTicket = p;
  const pmTotalCost = pmQty * pmCostPerTicket;

  // Deribit legs — check for no-market condition
  const leg1p = r.leg1_price;
  const leg2p = r.leg2_price;
  const leg1noMarket = leg1p == null || leg1p === 0;
  const leg2noMarket = leg2p == null || leg2p === 0;
  const anyNoMarket = leg1noMarket || leg2noMarket;
  // Deribit legs — support 2 or 4 legs
  const fmtLeg = (price, noMkt) => noMkt ? '<span style="color:var(--red);">无挂单</span>' : price.toFixed(4) + ' BTC/合约 × 0.1 = <b>$' + (price * ul * 0.1).toFixed(2) + '</b>';
  const leg1usd = fmtLeg(leg1p, leg1noMarket);
  const leg2usd = fmtLeg(leg2p, leg2noMarket);

  const leg3p = r.leg3_price;
  const leg4p = r.leg4_price;
  const leg3noMarket = leg3p == null || leg3p === 0;
  const leg4noMarket = leg4p == null || leg4p === 0;
  const has4legs = r.leg3_name != null;
  const anyNoMarketAll = anyNoMarket || (has4legs && (leg3noMarket || leg4noMarket));

  let dbTotalBTC = null;
  if (!anyNoMarketAll) {
    if (has4legs) {
      // 4 legs: sum of (sell legs bid - buy legs ask)
      let net = 0;
      [['leg1',leg1p],['leg2',leg2p],['leg3',leg3p],['leg4',leg4p]].forEach(([k,v]) => {
        net += (r[k+'_action'] === 'Sell' ? v : -v);
      });
      dbTotalBTC = net;
    } else {
      dbTotalBTC = (r.leg1_action === 'Sell' ? leg1p - leg2p : leg2p - leg1p);
    }
  }
  const dbTotalUSD = dbTotalBTC != null ? (dbTotalBTC * ul * 0.1).toFixed(2) : '--';

  // Combined
  const pnlPerTicket = r.qp != null ? r.qp.toFixed(4) : '--';
  const pnlTotal = r.qp != null ? (r.qp * pmQty).toFixed(2) : '--';
  const pnlColor = r.qp > 0 ? 'var(--green)' : 'var(--red)';
  const executable = !anyNoMarketAll && r.pm_ask != null;

  td.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
      <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;">
        <div style="font-weight:700;margin-bottom:8px;color:var(--accent);">PM 端（${r.direction}）</div>
        <table style="width:100%;font-size:0.8rem;">
          <tr><td style="color:var(--muted);">票价 (p)</td><td class="mono" style="text-align:right;">${p != null ? '$'+p.toFixed(3) : '--'}</td></tr>
          <tr><td style="color:var(--muted);">数量（匹配 0.1 BTC spread）</td><td class="mono" style="text-align:right;">${pmQty} 张</td></tr>
          <tr style="border-top:1px solid var(--border);"><td style="font-weight:600;">PM 总成本</td><td class="mono" style="text-align:right;font-weight:700;">$${pmTotalCost.toFixed(2)}</td></tr>
        </table>
      </div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;">
        <div style="font-weight:700;margin-bottom:8px;color:var(--blue);">Deribit 端（${r.deribit_desc}）</div>
        <table style="width:100%;font-size:0.8rem;">
          <tr><td style="color:var(--muted);">${r.leg1_action || '--'} ${r.leg1_name || '--'}</td><td class="mono" style="text-align:right;font-size:0.78rem;">${leg1usd}</td></tr>
          <tr><td style="color:var(--muted);">${r.leg2_action || '--'} ${r.leg2_name || '--'}</td><td class="mono" style="text-align:right;font-size:0.78rem;">${leg2usd}</td></tr>
          ${has4legs ? `<tr><td style="color:var(--muted);">${r.leg3_action || '--'} ${r.leg3_name || '--'}</td><td class="mono" style="text-align:right;font-size:0.78rem;">${fmtLeg(leg3p, leg3noMarket)}</td></tr>` : ''}
          ${has4legs ? `<tr><td style="color:var(--muted);">${r.leg4_action || '--'} ${r.leg4_name || '--'}</td><td class="mono" style="text-align:right;font-size:0.78rem;">${fmtLeg(leg4p, leg4noMarket)}</td></tr>` : ''}
          <tr><td style="color:var(--muted);">合约数量</td><td class="mono" style="text-align:right;">0.1 BTC / 每腿 × ${has4legs ? '4' : '2'} 腿</td></tr>
          <tr><td style="color:var(--muted);">保证金占用</td><td class="mono" style="text-align:right;">$${(sw * 0.1).toFixed(0)}</td></tr>
          <tr style="border-top:1px solid var(--border);"><td style="font-weight:600;">Deribit 净收入</td><td class="mono" style="text-align:right;font-weight:700;">${anyNoMarketAll ? '<span style="color:var(--red);">无法执行（盘口缺失）</span>' : '$'+dbTotalUSD}</td></tr>
        </table>
      </div>
    </div>
    <div style="background:var(--card);border:2px solid ${!executable ? 'var(--red)' : r.qp > 0 ? 'var(--green)' : 'var(--border)'};border-radius:8px;padding:14px;margin-bottom:16px;">
      ${!executable ? '<div style="color:var(--red);font-weight:700;font-size:1rem;margin-bottom:8px;">无法执行 — Deribit 盘口缺失</div>' : ''}
      <table style="width:100%;font-size:0.85rem;">
        <tr><td style="width:50%;">PM 成本</td><td class="mono">${r.pm_ask != null ? '$'+pmTotalCost.toFixed(2) : '--'}</td></tr>
        <tr><td>Deribit 净收入</td><td class="mono">${anyNoMarket ? '<span style="color:var(--red);">盘口缺失</span>' : '$'+dbTotalUSD}</td></tr>
        <tr style="border-top:2px solid var(--border);"><td style="font-weight:700;">预计到期损益（q-p × ${pmQty} 张）</td><td class="mono" style="font-weight:700;font-size:1.1rem;color:${executable ? pnlColor : 'var(--muted)'};">${executable ? (r.qp > 0 ? '+' : '') + '$' + pnlTotal : '无法计算'}</td></tr>
        ${executable ? `<tr><td style="color:var(--muted);">每张票损益</td><td class="mono" style="color:${pnlColor};">${r.qp > 0 ? '+' : ''}${pnlPerTicket}</td></tr>` : ''}
        <tr id="comboMaxRow"></tr>
      </table>
    </div>
    <div class="detail-charts">
      <div class="detail-chart"><p>PM 单腿损益</p><canvas id="detailChart1"></canvas></div>
      <div class="detail-chart"><p>Deribit 对冲损益</p><canvas id="detailChart2"></canvas></div>
      <div class="detail-chart"><p>组合 PnL</p><canvas id="detailChart3"></canvas></div>
    </div>
  `;
  detailRow.appendChild(td);
  tr.after(detailRow);

  openDetail = { tr, detailRow };

  // Draw charts — all values in TOTAL USD (× pmQty tickets)
  // Dynamic range: spread zone + 30% padding on each side
  const actionWidth = sw * 2; // the spread transition zone
  const pad = Math.max(actionWidth * 0.3, sw); // at least 1x spread width padding
  const lo = Math.round(K - actionWidth - pad);
  const hi = Math.round(K + actionWidth + pad);
  const step = Math.max(50, Math.round((hi - lo) / 100)); // ~100 data points
  const labels = [], pmPnl = [], dbPnl = [], comboPnl = [];

  for (let s = lo; s <= hi; s += step) {
    labels.push('$' + (s >= 1000 ? (s/1000).toFixed(1) + 'k' : s));

    // PM payoff per ticket
    let pmPayoff;
    if (r.type === 'Above') {
      pmPayoff = isYes ? (s >= K ? 1 : 0) : (s < K ? 1 : 0);
    } else {
      const k1 = Array.isArray(r.strike) ? r.strike[0] : K;
      const k2 = Array.isArray(r.strike) ? r.strike[1] : K + 2000;
      pmPayoff = isYes ? (s >= k1 && s <= k2 ? 1 : 0) : (s < k1 || s > k2 ? 1 : 0);
    }
    const pmTotal = (pmPayoff - p) * pmQty;
    pmPnl.push(+pmTotal.toFixed(2));

    // Deribit spread payoff per ticket
    let dbPayoff;
    if (r.type === 'Above') {
      if (isYes) {
        dbPayoff = Math.max(0, Math.min((s - K) / sw, 1));
      } else {
        dbPayoff = Math.max(0, Math.min((K - s) / sw, 1));
      }
    } else {
      dbPayoff = pmPayoff;
    }
    const dbTotal = (q - dbPayoff) * pmQty;
    dbPnl.push(+dbTotal.toFixed(2));

    comboPnl.push(+(pmTotal + dbTotal).toFixed(2));
  }

  const segGR = { borderColor: ctx => (ctx.p0.parsed.y <= 0 && ctx.p1.parsed.y <= 0) ? '#dc2626' : (ctx.p0.parsed.y > 0 && ctx.p1.parsed.y > 0) ? '#16a34a' : '#9ca3af' };
  const zeroGrid = { color: ctx => ctx.tick.value === 0 ? '#374151' : '#e5e7eb', lineWidth: ctx => ctx.tick.value === 0 ? 2 : 1 };
  const tipStyle = {
    backgroundColor:'rgba(26,29,39,0.95)', titleColor:'#e4e4e7', bodyColor:'#e4e4e7',
    borderColor:'rgba(255,255,255,0.1)', borderWidth:1, padding:10, cornerRadius:6,
    titleFont:{size:11,weight:'bold'}, bodyFont:{size:11},
    callbacks:{
      title: items => items[0] ? 'BTC ' + items[0].label : '',
      label: item => {
        const v = item.parsed.y;
        const sign = v >= 0 ? '+' : '';
        return '损益: ' + sign + '$' + v.toFixed(2);
      },
      labelColor: item => {
        const v = item.parsed.y;
        const c = v > 0 ? '#4ade80' : v < 0 ? '#f87171' : '#9ca3af';
        return { borderColor: c, backgroundColor: c };
      }
    }
  };
  const chartOpts = (yLabel) => ({ responsive:true, animation:{duration:0}, interaction:{mode:'nearest',intersect:false,axis:'x'}, plugins:{legend:{labels:{color:'#374151',font:{size:10}}},tooltip:tipStyle}, scales:{x:{title:{display:true,text:'BTC 到期价格',color:'#6b7280',font:{size:9}},ticks:{color:'#6b7280',maxTicksLimit:8,font:{size:9}},grid:{color:'#e5e7eb'}},y:{title:{display:true,text:yLabel,color:'#6b7280',font:{size:10}},ticks:{color:'#6b7280',font:{size:9},callback:v=>'$'+v},grid:zeroGrid,suggestedMin:0,suggestedMax:0}} });

  // Max/min
  const pmMax = Math.max(...pmPnl), pmMin = Math.min(...pmPnl);
  const dbMax = Math.max(...dbPnl), dbMin = Math.min(...dbPnl);
  const coMax = Math.max(...comboPnl), coMin = Math.min(...comboPnl);

  const fmtPnl = (v) => { const c = v >= 0 ? 'var(--green)' : 'var(--red)'; const s = v >= 0 ? '+' : ''; return `<span style="color:${c};font-weight:600;">${s}$${v.toFixed(2)}</span>`; };

  // Fill in combo max/min row
  const maxRow = document.getElementById('comboMaxRow');
  if (maxRow) {
    maxRow.innerHTML = `<td style="color:var(--muted);">组合最大盈亏</td><td class="mono">最大盈利 ${fmtPnl(coMax)} · 最大亏损 ${fmtPnl(coMin)}</td>`;
  }
  document.querySelector('#detailChart1').parentElement.querySelector('p').innerHTML = `PM ${r.direction}（${pmQty}张） 最大盈 ${fmtPnl(pmMax)} 最大亏 ${fmtPnl(pmMin)}`;
  document.querySelector('#detailChart2').parentElement.querySelector('p').innerHTML = `Deribit ${r.deribit_desc}（0.1BTC） 最大盈 ${fmtPnl(dbMax)} 最大亏 ${fmtPnl(dbMin)}`;
  document.querySelector('#detailChart3').parentElement.querySelector('p').innerHTML = `组合损益 <span style="color:${coMin >= 0 ? 'var(--green)' : 'var(--red)'};font-weight:600;">范围 $${coMin.toFixed(2)} ~ $${coMax.toFixed(2)}</span>`;

  // Find breakeven points for chart 1 and 2
  function findBE(data) {
    const be = new Set();
    for (let i = 1; i < data.length; i++) {
      if ((data[i-1] <= 0 && data[i] > 0) || (data[i-1] >= 0 && data[i] < 0)) be.add(i);
    }
    return be;
  }
  const pmBE = findBE(pmPnl);
  const dbBE = findBE(dbPnl);
  const mkPt = (data, beSet) => ({ r: data.map((_,i)=>beSet.has(i)?7:0), bg: data.map((_,i)=>beSet.has(i)?'#1d4ed8':'transparent'), bc: data.map((_,i)=>beSet.has(i)?'#fff':'transparent') });
  const pmPt = mkPt(pmPnl, pmBE);
  const dbPt = mkPt(dbPnl, dbBE);

  new Chart(document.getElementById('detailChart1'), { type:'line', data:{ labels, datasets:[
    { label:`PM ${r.direction} ×${pmQty}`, data:pmPnl, borderColor:'#16a34a', segment:segGR, fill:{target:'origin',above:'rgba(22,163,74,0.15)',below:'rgba(220,38,38,0.15)'}, stepped:true, pointRadius:pmPt.r, pointBackgroundColor:pmPt.bg, pointBorderColor:pmPt.bc, pointBorderWidth:2, pointHoverRadius:10, borderWidth:2 }
  ]}, options:chartOpts('损益 (USD)') });

  new Chart(document.getElementById('detailChart2'), { type:'line', data:{ labels, datasets:[
    { label:`Deribit ×0.1BTC`, data:dbPnl, borderColor:'#ca8a04', segment:segGR, fill:{target:'origin',above:'rgba(22,163,74,0.15)',below:'rgba(220,38,38,0.15)'}, pointRadius:dbPt.r, pointBackgroundColor:dbPt.bg, pointBorderColor:dbPt.bc, pointBorderWidth:2, pointHoverRadius:10, borderWidth:2 }
  ]}, options:chartOpts('损益 (USD)') });

  // Chart 3: Zoomed tighter into the transition zone
  const z3pad = Math.max(sw * 1.5, actionWidth * 0.5);
  const zoomLo = Math.round(K - sw - z3pad), zoomHi = Math.round(K + sw + z3pad);
  const zStep = Math.max(20, Math.round((zoomHi - zoomLo) / 120));
  const zLabels = [], zCombo = [];
  for (let s = zoomLo; s <= zoomHi; s += zStep) {
    zLabels.push('$' + (s/1000).toFixed(1) + 'k');
    let pmPay;
    if (r.type === 'Above') { pmPay = isYes ? (s >= K ? 1 : 0) : (s < K ? 1 : 0); }
    else { const k1a = Array.isArray(r.strike)?r.strike[0]:K, k2a = Array.isArray(r.strike)?r.strike[1]:K+2000; pmPay = isYes ? (s>=k1a&&s<=k2a?1:0) : (s<k1a||s>k2a?1:0); }
    let dbPay;
    if (r.type === 'Above') { dbPay = isYes ? Math.max(0,Math.min((s-K)/sw,1)) : Math.max(0,Math.min((K-s)/sw,1)); }
    else { dbPay = pmPay; }
    zCombo.push(+((pmPay - p + q - dbPay) * pmQty).toFixed(2));
  }

  // Find breakeven points (where combo crosses zero)
  const breakevens = [];
  for (let i = 1; i < zCombo.length; i++) {
    if ((zCombo[i-1] <= 0 && zCombo[i] > 0) || (zCombo[i-1] >= 0 && zCombo[i] < 0)) {
      breakevens.push({ label: zLabels[i], index: i, price: zoomLo + i * 100 });
    }
  }

  // Mark breakeven points directly in data as special points
  // Insert breakeven values into the dataset so tooltip naturally snaps to them
  const beIndices = new Set(breakevens.map(b => b.index));
  const zPointRadius = zCombo.map((_, i) => beIndices.has(i) ? 7 : 0);
  const zPointBgColor = zCombo.map((_, i) => beIndices.has(i) ? '#1d4ed8' : 'transparent');
  const zPointBorderColor = zCombo.map((_, i) => beIndices.has(i) ? '#fff' : 'transparent');
  const annotations = {};

  const zCoMax = Math.max(...zCombo), zCoMin = Math.min(...zCombo);
  const allProfit = zCoMin > 0, allLoss = zCoMax < 0;
  let ch3Status = '';
  if (allProfit) ch3Status = ' <span style="color:var(--green);font-weight:600;">全区间盈利</span>';
  else if (allLoss) ch3Status = ' <span style="color:var(--red);font-weight:600;">全区间亏损</span>';
  else ch3Status = breakevens.map(b => ` <span style="color:var(--blue);font-weight:600;">平衡点 ${b.label}</span>`).join('');
  document.querySelector('#detailChart3').parentElement.querySelector('p').innerHTML = `组合损益（放大） ${fmtPnl(zCoMin)} ~ ${fmtPnl(zCoMax)}` + ch3Status;

  new Chart(document.getElementById('detailChart3'), { type:'line', data:{ labels: zLabels, datasets:[
    { label:'组合', data:zCombo, borderColor:'#16a34a', segment:segGR, fill:{target:'origin',above:'rgba(22,163,74,0.15)',below:'rgba(220,38,38,0.15)'}, pointRadius:zPointRadius, pointBackgroundColor:zPointBgColor, pointBorderColor:zPointBorderColor, pointBorderWidth:2, pointHoverRadius:10, borderWidth:3 }
  ]}, options:{
    responsive:true, animation:{duration:0},
    interaction:{mode:'nearest',intersect:false,axis:'x'},
    plugins:{
      legend:{labels:{color:'#374151',font:{size:10}}},
      tooltip:{
        backgroundColor:'rgba(26,29,39,0.95)', titleColor:'#e4e4e7', bodyColor:'#e4e4e7',
        borderColor:'rgba(255,255,255,0.1)', borderWidth:1, padding:10, cornerRadius:6,
        titleFont:{size:11,weight:'bold'}, bodyFont:{size:11},
        callbacks:{
          title:items=>items[0]?'BTC '+items[0].label:'',
          label:item=>{
            const v = item.parsed.y;
            const sign = v >= 0 ? '+' : '';
            const isBE = beIndices.has(item.dataIndex);
            return (isBE ? '[ 盈亏平衡点 ] ' : '') + '损益: ' + sign + '$' + v.toFixed(2);
          },
          labelColor:item=>{
            const isBE = beIndices.has(item.dataIndex);
            const v = item.parsed.y;
            const c = isBE ? '#60a5fa' : v > 0 ? '#4ade80' : v < 0 ? '#f87171' : '#9ca3af';
            return {borderColor:c, backgroundColor:c};
          }
        }
      },
      annotation:{ annotations }
    },
    scales:{
      x:{title:{display:true,text:'BTC 到期价格',color:'#6b7280',font:{size:9}},ticks:{color:'#6b7280',maxTicksLimit:10,font:{size:9}},grid:{color:'#e5e7eb'}},
      y:{title:{display:true,text:'损益 (USD)',color:'#6b7280',font:{size:10}},ticks:{color:'#6b7280',font:{size:9},callback:v=>'$'+v},grid:zeroGrid,suggestedMin:0,suggestedMax:0}
    }
  }});
}

function setFilter(f, btn) {
  currentFilter = f;
  btn.parentElement.querySelectorAll('button').forEach(b => { if(!b.classList.contains('refresh-btn') && !b.classList.contains('sep')) {} });
  // Simple: just re-render
  renderTable();
  // Update active state for this group
  const btns = btn.parentElement.children;
  for (let i = 0; i < 3; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
}

function setDirFilter(f, btn) {
  currentDirFilter = f;
  renderTable();
  const btns = btn.parentElement.children;
  for (let i = 4; i < 7; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
}

function setSort(s) { currentSort = s; renderTable(); }
function toggleQPSort() {
  currentSort = currentSort === 'qp_desc' ? 'qp_asc' : 'qp_desc';
  document.getElementById('qpHeader').textContent = 'q - p ' + (currentSort === 'qp_desc' ? '↓' : '↑');
  renderTable();
}
function toggleNull(btn) { hideNull = !hideNull; btn.classList.toggle('active'); renderTable(); }
let hideNoBook = false;
function toggleNoBook(btn) { hideNoBook = !hideNoBook; btn.classList.toggle('active'); renderTable(); }

// Auto refresh every 60s, pause when detail is open
let refreshTimer = null;
function startAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(() => {
    if (!openDetail) fetchData();
  }, 60000);
}
fetchData();
startAutoRefresh();
</script>
</body>
</html>
